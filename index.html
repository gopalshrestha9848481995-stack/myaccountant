  const firebaseConfig = {

  function App(){
    const [txs, setTxs] = useState([]);
    const [sync, setSync] = useState("syncing");
    const [search, setSearch] = useState("");
    const [filterType, setFilterType] = useState("all");
    const [filterMonth, setFilterMonth] = useState("all");
    const [isOpen, setIsOpen] = useState(false);
    const [editing, setEditing] = useState(null);
    const [form, setForm] = useState({amount:"", type:"expense", category:"Food", date:new Date().toISOString().slice(0,10), note:""});
    const [limit, setLimit] = useState(()=>{ try{return Number(localStorage.getItem(LIMIT_KEY))||0}catch{return 0}});

    const [limitInput, setLimitInput] = useState(limit);

    const [toast, setToast] = useState(null);
    const [showMoreMenu, setShowMoreMenu] = useState(false);
    
    const [incomeCats, setIncomeCats] = useState(()=>{
      try{
        const raw=localStorage.getItem(CAT_KEY);
        if(raw){ const p=JSON.parse(raw); if(p.income && Array.isArray(p.income) && p.income.length) return p.income; }
      }catch{}
      return DEFAULT_INC;
    });
    const [expenseCats, setExpenseCats] = useState(()=>{
      try{
        const raw=localStorage.getItem(CAT_KEY);
        if(raw){ const p=JSON.parse(raw); if(p.expense && Array.isArray(p.expense) && p.expense.length) return p.expense; }
      }catch{}
      return DEFAULT_EXP;

      const b=new Blob([JSON.stringify(txs,null,2)],{type:"application/json"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=`accountant-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(u);

      if(fb && sync!=="offline"){ for(const t of txs){ try{ await fb.deleteDoc(fb.doc(fb.db,"transactions",t.id)); }catch{} } }

      const v=Number(limitInput); if(v<0){ alert("Invalid"); return; }

    const saveIncomeGoal = ()=>{
      const v=Number(incomeGoalInput); if(v<0){ alert("Invalid"); return; }

    };

    const currentCatList = catTab==="income" ? incomeCats : expenseCats;
    const setCurrentCatList = catTab==="income" ? setIncomeCats : setExpenseCats;

    const handleAddCat = ()=>{
      const name=newCatName.trim();
      if(!name){ showToast("Enter category name","warning"); return; }
      if(name.length>20){ showToast("Keep name under 20 chars","warning"); return; }

    };

    const handleDeleteCat = (catName)=>{
      if(catName==="Other"){ showToast("Cannot delete Other","warning"); return; }
      const usedCount = txs.filter(t=> t.category===catName && t.type===catTab).length;
      if(usedCount>0){
        if(!confirm(`"${catName}" is used in ${usedCount} transaction(s). Delete anyway? Those transactions will be moved to "Other".`)) return;
        setTxs(prev=> prev.map(t=> t.category===catName && t.type===catTab ? {...t, category:"Other"} : t));
        const fb=fbRef.current;
        if(fb && sync!=="offline"){
          txs.filter(t=> t.category===catName && t.type===catTab).forEach(async t=>{
            try{ await fb.updateDoc(fb.doc(fb.db,"transactions",t.id), {category:"Other"}); }catch{}
          });
        }
      } else {
        if(!confirm(`Delete "${catName}"?`)) return;
      }
      setCurrentCatList(prev=> prev.filter(c=>c!==catName));
      showToast(`${catName} deleted`,"info");
      if(form.category===catName && form.type===catTab){
        setForm(f=>({...f, category:"Other"}));
      }
    };

      if(oldName==="Other"){ showToast("Cannot rename Other","warning"); return; }

      const trimmed=newName.trim();

      setCurrentCatList(prev=> prev.map(c=> c===oldName ? trimmed : c));

        setTxs(prev=> prev.map(t=> t.category===oldName && t.type===catTab ? {...t, category:trimmed} : t));
        const fb=fbRef.current;
        if(fb && sync!=="offline"){
          txs.filter(t=> t.category===oldName && t.type===catTab).forEach(async t=>{
            try{ await fb.updateDoc(fb.doc(fb.db,"transactions",t.id), {category:trimmed}); }catch{}
          });

        showToast(`Renamed ${affected} transaction(s) to ${trimmed}`,"success");
      } else {
        showToast(`Renamed to ${trimmed}`,"success");
      }
      if(form.category===oldName && form.type===catTab){
        setForm(f=>({...f, category:trimmed}));
      }

          React.createElement("span", {className:"w-5 h-5 rounded-full bg-white/15 grid place-items-center text-[11px] shrink-0"}, toast.type==="error"?"!":toast.type==="warning"?"⚠":"✓"),

              React.createElement("span", {className:"serif font-bold text-[18px] tracking-tight"}, "₨")
